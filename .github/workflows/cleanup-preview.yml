name: Cleanup Preview

on:
  pull_request:
    types: [closed]

concurrency:
  group: dokku-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  destroy-preview:
    runs-on: ubuntu-latest
    environment:
      name: Preview
    steps:
      - name: Compute preview app name
        id: meta
        run: |
          base="${{ vars.DOKKU_APP || 'annajakubik' }}"
          echo "app=${base}-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DOKKU_SSH_PRIVATE_KEY }}" > ~/.ssh/id_dokku
          chmod 600 ~/.ssh/id_dokku
          ssh-keyscan -p 22 "${{ vars.DOKKU_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Destroy preview app
        env:
          APP: ${{ steps.meta.outputs.app }}
        run: |
          # --force skips the interactive confirmation. Ignore failure if the
          # app was never created or was already destroyed.
          ssh -i ~/.ssh/id_dokku "dokku@${{ vars.DOKKU_HOST }}" apps:destroy "$APP" --force || true
